server {
    listen 80;
    server_name localhost;

    absolute_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        return 302 /en/;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|webp)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }
}